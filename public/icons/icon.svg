<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Delivery Box -->
  <rect x="140" y="200" width="232" height="160" rx="12" fill="#ffffff"/>
  <rect x="140" y="200" width="232" height="40" rx="12" fill="#d1fae5"/>
  <rect x="236" y="200" width="40" height="160" fill="#10b981"/>
  <!-- Drone Wings -->
  <ellipse cx="100" cy="240" rx="60" ry="20" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="412" cy="240" rx="60" ry="20" fill="#ffffff" opacity="0.9"/>
  <!-- Drone Body -->
  <ellipse cx="256" cy="160" rx="50" ry="30" fill="#ffffff"/>
  <!-- Speed Lines -->
  <line x1="60" y1="300" x2="100" y2="300" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="412" y1="300" x2="452" y2="300" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="340" x2="100" y2="340" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="412" y1="340" x2="442" y2="340" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>
